<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文档脱敏服务 MVP</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
    .result { margin-top: 20px; padding: 12px; background: #f7f7f7; border-radius: 6px; white-space: pre-wrap; }
    button { padding: 8px 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>文档脱敏服务 MVP</h2>
    <p>支持 txt / md / docx / xlsx，最大 20MB。</p>
    <form id="uploadForm">
      <input type="file" id="fileInput" name="file" required />
      <button type="submit">上传并脱敏</button>
    </form>
    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files.length) return;

      const fd = new FormData();
      fd.append('file', fileInput.files[0]);
      result.style.display = 'block';
      result.textContent = '处理中...';

      try {
        const res = await fetch('/api/v1/desensitize', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '处理失败');
        result.innerHTML = `任务ID: ${data.task_id}\n命中数: ${data.total_hits}\n\n<a href="${data.output_file}" target="_blank">下载脱敏文件</a>\n<a href="${data.report_file}" target="_blank">查看报告</a>\n<a href="${data.bundle_file}" target="_blank">下载 ZIP 打包结果</a>`;
      } catch (err) {
        result.textContent = '出错：' + err.message;
      }
    });
  </script>
</body>
</html>
